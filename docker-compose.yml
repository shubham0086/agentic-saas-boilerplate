version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - PORT=8000
      - STRIPE_WEBHOOK_SECRET=whsec_mocksecret12345
      - RAZORPAY_WEBHOOK_SECRET=rzp_mocksecret12345
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev:frontend"
    depends_on:
      - backend
